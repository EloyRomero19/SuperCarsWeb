<section class="noticia-detalle text-white">
  <div class="container py-5" *ngIf="noticia; else sinNoticia">

    <article>
      <header class="article-hero mb-4">
        <div class="row g-4 align-items-center">
          <div class="col-lg-6 order-2 order-lg-1">
            <div class="d-flex flex-wrap gap-2 mb-3">
              <span class="badge rounded-pill text-bg-dark border px-3 py-2">
                Actualidad
              </span>

              <span class="badge rounded-pill text-bg-dark border px-3 py-2">
                {{ noticia.fecha }}
              </span>
            </div>

            <h1 class="article-title fw-bold mb-4">
              {{ noticia.titulo }}
            </h1>

            <p class="article-lead mb-0">
              {{ noticia.resumen }}
            </p>
          </div>

          <div class="col-lg-6 order-1 order-lg-2">
            <div class="media-stage">
              <ng-container *ngIf="noticia.imagen; else videoTemplate">
                <img
                  [src]="noticia.imagen"
                  class="img-fluid detalle-media"
                  [alt]="noticia.titulo"
                >
              </ng-container>

              <ng-template #videoTemplate>
                <video
                  *ngIf="noticia.video"
                  class="img-fluid detalle-media"
                  autoplay
                  loop
                  playsinline
                  controls
                  [muted]="true"
                  [defaultMuted]="true"
                >
                  <source [src]="noticia.video" type="video/mp4">
                </video>
              </ng-template>
            </div>
          </div>
        </div>
      </header>

      <div class="row g-4 justify-content-center">
        <div class="col-lg-3">
          <aside class="article-meta p-4">
            <span>Fecha</span>
            <strong>{{ noticia.fecha }}</strong>
            <hr>
            <span>Sección</span>
            <strong>Superdeportivos</strong>
            <hr>
            <span>Fuente</span>
            <strong>SuperCars</strong>
          </aside>
        </div>

        <div class="col-lg-8">
          <div class="article-body p-4 p-md-5">
            <p>
              {{ noticia.contenido }}
            </p>
          </div>

          <div class="article-actions d-flex flex-wrap gap-3 mt-4">
            <a routerLink="/noticias" class="btn btn-gradient rounded-pill px-4">
              Volver a noticias
            </a>
          </div>
        </div>
      </div>
    </article>

  </div>

  <ng-template #sinNoticia>
    <div class="container py-5 text-center">
      <div class="spinner-border text-light" role="status" *ngIf="cargando">
        <span class="visually-hidden">Cargando</span>
      </div>

      <ng-container *ngIf="!cargando">
        <h1 class="fw-bold mb-3">Noticia no encontrada</h1>
        <p class="text-white-50 mb-4">
          La noticia solicitada no existe.
        </p>
        <a routerLink="/noticias" class="btn btn-gradient rounded-pill px-4">
          Volver a noticias
        </a>
      </ng-container>
    </div>
  </ng-template>
</section>
