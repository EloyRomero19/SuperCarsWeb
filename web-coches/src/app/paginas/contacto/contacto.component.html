<section class="video-bg">

  <video autoplay muted loop playsinline preload="auto">
    <source src="https://res.cloudinary.com/doiaqcxy9/video/upload/q_auto:good,f_auto,w_1280/bmwMejor_v7e6kb.mp4"
            type="video/mp4">
  </video>

  <div class="video-overlay"></div>

  <main class="container position-relative z-1 pb-5">

    <div class="row justify-content-center">

      <div class="col-lg-8">

        <h1 class="text-center text-white fw-bold mb-3">
          Contáctanos
        </h1>

        <p class="text-center text-white mb-4">
          Has llegado al formulario rápido con el cuestionario prellenado.
          Completa tus datos y envía cuando quieras.
        </p>

        <div class="card bg-glass text-white p-4 border-0">

          <form
            [formGroup]="contactoForm"
            (ngSubmit)="enviarFormulario()"
          >

            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input
                class="form-control"
                formControlName="nombre"
                placeholder="Juan">
            </div>

            <div class="mb-3">
              <label class="form-label">Apellidos</label>
              <input
                class="form-control"
                formControlName="apellidos"
                placeholder="Pérez">
            </div>

            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label">Teléfono</label>
                <input
                  class="form-control"
                  formControlName="telefono"
                  placeholder="+34 600 000 000">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Correo electrónico</label>
                <input
                  class="form-control"
                  formControlName="email"
                  placeholder="correo@gmail.com">
              </div>

            </div>

            <div class="mb-3">
              <label class="form-label">Asunto</label>
              <input
                class="form-control"
                formControlName="asunto"
                placeholder="Información sobre modelo...">
            </div>

            <div class="mb-3">
              <label class="form-label">Cuestionario / Mensaje</label>

              <textarea
                rows="8"
                class="form-control"
                formControlName="mensaje"
                placeholder="Quisiera recibir información sobre:
- Modelo(es) de interés:
- Presupuesto aproximado:
- Opciones de financiación:
- Disponibilidad para prueba:
- Comentarios adicionales:">
              </textarea>
            </div>

            <div class="form-check mb-4">
              <input
                type="checkbox"
                class="form-check-input"
                formControlName="consentimiento">

              <label class="form-check-label">
                Acepto que me contacten vía teléfono o correo
              </label>
            </div>

            <div *ngIf="enviado" class="alert alert-success">
              🚀 ¡Mensaje enviado correctamente!
            </div>

            <button
              type="submit"
              class="btn btn-gradient btn-lg w-100"
            >
              Enviar y ser contactado
            </button>

          </form>

        </div>

      </div>

    </div>

  </main>

</section>
